<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه موقعیت‌یاب ماهان الکترونیک پرنیا</title>
    
    <!-- کتابخانه‌های خارجی -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.2/mqttws31.min.js" type="text/javascript"></script>
    <!-- استایل سفارشی -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="control-panel">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <h1 class="mb-0">
                                <i class="fas fa-satellite-dish me-2"></i>
                                سامانه موقعیت‌یاب
                            </h1>
                            <p class="text-muted mb-0">ماهان الکترونیک پرنیا</p>
                        </div>
                        <div class="col-md-6 toggle-group">
                            <div class="toggle-wrapper">
                                <label class="custom-toggle">
                                    <input type="checkbox" id="darkModeSwitch">
                                    <span class="slider"></span>
                                </label>
                                <small>حالت شب</small>
                            </div>
                            <div class="toggle-wrapper">
                                <label class="custom-toggle">
                                    <input type="checkbox" id="historySwitchSwitch">
                                    <span class="slider"></span>
                                </label>
                                <small>نمایش سوابق</small>
                            </div>
                            <div class="toggle-wrapper">
                                <label class="custom-toggle">
                                    <input type="checkbox" id="mapTypeSwitch">
                                    <span class="slider"></span>
                                </label>
                                <small>نقشه ماهواره‌ای</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div id="mapid" class="map-container"></div>
            </div>
        </div>

        <div class="location-details text-center">
            <div id="locationInfo"></div>
        </div>
    </div>

    <footer class="footer-copyright">
        © 1404 تمامی حقوق متعلق به شرکت ماهان الکترونیک پرنیا
    </footer>

    <!-- کتابخانه‌های جاوااسکریپت -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
    
    <!-- اسکریپت سفارشی -->
    <script src="script.js"></script>
</body>
</html>
