<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه موقعیت‌یاب ماهان الکترونیک پرنیا</title>
    
    <!-- کتابخانه‌های خارجی -->
    <link href="https://cdn.giot.ir/js/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdn.giot.ir/js/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css">
    <script src="https://cdn.giot.ir/js/mqtt.min.js"></script>
    <!-- استایل سفارشی -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="control-panel">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <h1 class="mb-0">
                                <i class="fas fa-satellite-dish me-2"></i>
                                سامانه موقعیت‌یاب
                            </h1>
                            <p class="text-muted mb-0">ماهان الکترونیک پرنیا</p>
                        </div>
                        <div class="col-md-6 toggle-group">
                            <div class="toggle-wrapper">
                                <label class="custom-toggle">
                                    <input type="checkbox" id="darkModeSwitch">
                                    <span class="slider"></span>
                                </label>
                                <small>حالت شب</small>
                            </div>
                            <div class="toggle-wrapper">
                                <label class="custom-toggle">
                                    <input type="checkbox" id="historySwitchSwitch">
                                    <span class="slider"></span>
                                </label>
                                <small>نمایش سوابق</small>
                            </div>
                            <div class="toggle-wrapper">
                                <label class="custom-toggle">
                                    <input type="checkbox" id="mapTypeSwitch">
                                    <span class="slider"></span>
                                </label>
                                <small>نقشه ماهواره‌ای</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Historical Data Panel -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="historical-data-card" id="historicalDataPanel">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-history"></i>
                            مشاهده داده‌های تاریخی
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="date-input-group">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="startDateTime" class="form-label">
                                        <i class="fas fa-calendar-plus me-1"></i>
                                        تاریخ و زمان شروع:
                                    </label>
                                    <input type="datetime-local" class="form-control" id="startDateTime">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="endDateTime" class="form-label">
                                        <i class="fas fa-calendar-minus me-1"></i>
                                        تاریخ و زمان پایان:
                                    </label>
                                    <input type="datetime-local" class="form-control" id="endDateTime">
                                </div>
                            </div>
                        </div>
                        
                        <div class="quick-actions">
                            <button type="button" class="btn btn-primary" onclick="loadHistoricalData()">
                                <i class="fas fa-search me-1"></i>
                                جستجو
                            </button>
                            <button type="button" class="btn btn-info" onclick="loadTodayData()">
                                <i class="fas fa-calendar-day me-1"></i>
                                امروز
                            </button>
                            <button type="button" class="btn btn-warning" onclick="loadLastDaysData(7)">
                                <i class="fas fa-calendar-week me-1"></i>
                                ۷ روز گذشته
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="loadLastDaysData(30)">
                                <i class="fas fa-calendar-alt me-1"></i>
                                ۳۰ روز گذشته
                            </button>
                            <button type="button" class="btn btn-success" onclick="showReceivedDataHistory()">
                                <i class="fas fa-history me-1"></i>
                                نمایش سوابق دریافتی تاریخی
                            </button>
                        </div>
                        
                        <div id="historicalDataResults" style="display: none;">
                            <div id="historicalSummary" class="historical-summary">
                                <h6><i class="fas fa-chart-line me-2"></i>خلاصه نتایج</h6>
                                <div id="summaryContent"></div>
                            </div>
                            <div class="table-responsive">
                                <table class="table historical-data-table" id="historicalDataTable">
                                    <thead>
                                        <tr>
                                            <th><i class="fas fa-clock me-1"></i>زمان</th>
                                            <th><i class="fas fa-eye me-1"></i>پیش‌نمایش داده</th>
                                            <th><i class="fas fa-compass me-1"></i>جهت</th>
                                            <th><i class="fas fa-cogs me-1"></i>عملیات</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div id="mapid" class="map-container"></div>
            </div>
        </div>

        <div class="location-details text-center">
            <div id="locationInfo"></div>
        </div>
    </div>

    <footer class="footer-copyright">
        © 1404 تمامی حقوق متعلق به شرکت ماهان الکترونیک پرنیا
    </footer>

    <!-- کتابخانه‌های جاوااسکریپت -->
    <script src="https://cdn.giot.ir/js/jquery.min.js"></script>
    <script src="https://cdn.giot.ir/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
    
    <!-- اسکریپت سفارشی -->
    <script src="script.js"></script>
</body>
</html>
